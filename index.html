<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CISA Try Out — Cerita Mang Bedjo</title>
<style>
:root {
  --dk: #1E3A0F;
  --md: #2D5016;
  --mg: #4A7C2F;
  --lg: #A8C97F;
  --pg: #EEF5E8;
  --ao: #C75B12;
  --bg: #F7FAF4;
  --tx: #1a1a1a;
  --tx2: #555;
  --bdr: #d0d8c8;
  --card: #ffffff;
  --radius: 10px;
  --shadow: 0 2px 8px rgba(30,58,15,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--tx);
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
/* --- HEADER --- */
.hdr {
  background: linear-gradient(135deg, var(--dk) 0%, var(--md) 100%);
  color: #fff;
  padding: 14px 20px;
  position: sticky; top: 0; z-index: 100;
}
.hdr-inner {
  max-width: 720px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
}
.hdr-brand { display: flex; flex-direction: column; gap: 1px; }
.hdr-title { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
.hdr-sub { font-size: 11px; opacity: 0.75; letter-spacing: 0.3px; }
.lang-toggle {
  display: flex; background: rgba(255,255,255,0.15); border-radius: 6px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.2);
}
.lang-btn {
  padding: 6px 12px; font-size: 13px; font-weight: 600;
  border: none; cursor: pointer; color: rgba(255,255,255,0.7);
  background: transparent; transition: all 0.2s;
}
.lang-btn.active { background: rgba(255,255,255,0.25); color: #fff; }
/* --- MAIN CONTAINER --- */
.wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 40px; }
/* --- HOME --- */
.home-title { text-align: center; margin-bottom: 6px; font-size: 24px; font-weight: 700; color: var(--dk); }
.home-desc { text-align: center; color: var(--ao); font-size: 14px; margin-bottom: 20px; line-height: 1.5; white-space: pre-line; }
.stats-row {
  display: flex; justify-content: center; gap: 32px; margin-bottom: 32px;
}
.stat { text-align: center; }
.stat-num { font-size: 28px; font-weight: 800; color: var(--dk); }
.stat-lbl { font-size: 11px; color: var(--tx2); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }
/* --- MODE CARDS --- */
.modes {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 36px;
}
.mode-card {
  background: var(--card); border: 1.5px solid var(--bdr); border-radius: var(--radius);
  padding: 20px 18px; cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; gap: 8px;
}
.mode-card:hover { border-color: var(--mg); box-shadow: var(--shadow); transform: translateY(-1px); }
.mode-card:active { transform: translateY(0); }
.mode-icon { font-size: 22px; }
.mode-name { font-size: 15px; font-weight: 700; color: var(--dk); }
.mode-desc { font-size: 12.5px; color: var(--tx2); line-height: 1.4; }
/* Domain selector */
.domain-select-wrap { margin-bottom: 36px; display: none; }
.domain-select-title { font-size: 16px; font-weight: 700; color: var(--dk); margin-bottom: 12px; }
.domain-options { display: flex; flex-direction: column; gap: 8px; }
.domain-opt {
  background: var(--card); border: 1.5px solid var(--bdr); border-radius: var(--radius);
  padding: 14px 16px; cursor: pointer; transition: all 0.2s;
  display: flex; justify-content: space-between; align-items: center;
}
.domain-opt:hover { border-color: var(--mg); }
.domain-opt-name { font-weight: 600; font-size: 14px; color: var(--dk); }
.domain-opt-count { font-size: 13px; color: var(--tx2); }
/* --- HISTORY --- */
.history-section { margin-top: 8px; }
.history-title { font-size: 16px; font-weight: 700; color: var(--dk); margin-bottom: 14px; text-align: center; }
.history-empty {
  text-align: center; padding: 32px 16px; color: var(--tx2); font-size: 13.5px;
}
.history-empty-icon { font-size: 36px; margin-bottom: 8px; display: block; opacity: 0.4; }
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item {
  background: var(--card); border: 1px solid var(--bdr); border-radius: var(--radius);
  padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; transition: all 0.15s;
}
.history-item:hover { border-color: var(--mg); }
.hi-left { display: flex; flex-direction: column; gap: 2px; }
.hi-mode { font-size: 13px; font-weight: 600; color: var(--dk); }
.hi-date { font-size: 11.5px; color: var(--tx2); }
.hi-score {
  font-size: 18px; font-weight: 800; color: var(--mg);
  background: var(--pg); padding: 4px 12px; border-radius: 6px;
}
.history-more {
  display: block; margin: 16px auto 0; padding: 10px 24px;
  background: transparent; border: 1.5px solid var(--bdr); border-radius: var(--radius);
  color: var(--mg); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.history-more:hover { border-color: var(--mg); background: var(--pg); }
/* --- QUIZ SCREEN --- */
.quiz-screen { display: none; }
.quiz-topbar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--bdr);
}
.quiz-progress { font-size: 14px; font-weight: 700; color: var(--dk); }
.quiz-timer {
  font-size: 14px; font-weight: 700; color: var(--ao);
  font-variant-numeric: tabular-nums;
}
.quiz-domain-tag {
  display: inline-block; font-size: 11px; font-weight: 600;
  color: var(--mg); background: var(--pg); padding: 3px 10px; border-radius: 4px;
  margin-bottom: 14px;
}
.quiz-stem {
  font-size: 15.5px; line-height: 1.65; margin-bottom: 20px; color: var(--tx);
  white-space: pre-wrap;
}
.options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.opt-btn {
  background: var(--card); border: 1.5px solid var(--bdr); border-radius: var(--radius);
  padding: 14px 16px; cursor: pointer; transition: all 0.15s;
  text-align: left; font-size: 14.5px; line-height: 1.5; display: flex; gap: 12px;
  align-items: flex-start;
}
.opt-btn:hover:not(.opt-disabled) { border-color: var(--mg); background: var(--pg); }
.opt-key {
  flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
  background: var(--pg); display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--dk);
}
.opt-text { flex: 1; padding-top: 3px; }
.opt-btn.selected { border-color: var(--mg); background: var(--pg); }
.opt-btn.selected .opt-key { background: var(--mg); color: #fff; }
.opt-btn.correct { border-color: #2e7d32; background: #e8f5e9; }
.opt-btn.correct .opt-key { background: #2e7d32; color: #fff; }
.opt-btn.wrong { border-color: #c62828; background: #ffebee; }
.opt-btn.wrong .opt-key { background: #c62828; color: #fff; }
.opt-btn.opt-disabled { cursor: default; }
.opt-btn.neutral-revealed { border-color: var(--bdr); background: var(--card); opacity: 0.7; }
/* Justification */
.justification {
  display: none; margin-bottom: 20px; background: var(--pg);
  border-radius: var(--radius); padding: 16px 18px; border-left: 4px solid var(--mg);
}
.justification.show { display: block; }
.just-title { font-size: 13px; font-weight: 700; color: var(--dk); margin-bottom: 10px; }
.just-item { font-size: 13.5px; line-height: 1.55; margin-bottom: 8px; color: var(--tx); }
.just-item:last-child { margin-bottom: 0; }
/* Nav */
.quiz-nav { display: flex; gap: 10px; justify-content: space-between; }
.q-btn {
  padding: 12px 24px; border-radius: var(--radius); font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.15s;
}
.q-btn-primary { background: var(--mg); color: #fff; }
.q-btn-primary:hover { background: var(--md); }
.q-btn-secondary { background: var(--card); color: var(--dk); border: 1.5px solid var(--bdr); }
.q-btn-secondary:hover { border-color: var(--mg); background: var(--pg); }
.q-btn-danger { background: #c62828; color: #fff; }
.q-btn-danger:hover { background: #a21b1b; }
.q-btn:disabled { opacity: 0.4; cursor: default; }
/* Pill nav (question number dots) */
.pill-nav {
  display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; justify-content: center;
}
.pill {
  width: 32px; height: 28px; border-radius: 4px; font-size: 11px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  border: 1px solid var(--bdr); background: var(--card); color: var(--tx2); transition: all 0.15s;
}
.pill:hover { border-color: var(--mg); }
.pill.current { border-color: var(--mg); background: var(--mg); color: #fff; }
.pill.answered { background: var(--pg); color: var(--dk); border-color: var(--lg); }
.pill.pill-correct { background: #e8f5e9; color: #2e7d32; border-color: #2e7d32; }
.pill.pill-wrong { background: #ffebee; color: #c62828; border-color: #c62828; }
/* --- RESULTS SCREEN --- */
.results-screen { display: none; }
.results-header { text-align: center; margin-bottom: 28px; }
.results-score-big {
  font-size: 56px; font-weight: 800; color: var(--dk); line-height: 1;
}
.results-score-label { font-size: 14px; color: var(--tx2); margin-top: 4px; }
.results-passfail {
  display: inline-block; margin-top: 10px; padding: 6px 20px; border-radius: 20px;
  font-size: 14px; font-weight: 700;
}
.results-pass { background: #e8f5e9; color: #2e7d32; }
.results-fail { background: #ffebee; color: #c62828; }
.domain-breakdown { margin-bottom: 28px; }
.db-title { font-size: 15px; font-weight: 700; color: var(--dk); margin-bottom: 12px; }
.db-item {
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}
.db-label { font-size: 13px; width: 60px; font-weight: 600; color: var(--dk); flex-shrink: 0; }
.db-bar-wrap {
  flex: 1; height: 22px; background: #e8e8e8; border-radius: 4px; overflow: hidden; position: relative;
}
.db-bar {
  height: 100%; background: var(--mg); border-radius: 4px; transition: width 0.6s ease;
  min-width: 2px;
}
.db-bar.low { background: #c62828; }
.db-bar.mid { background: var(--ao); }
.db-pct { font-size: 13px; font-weight: 700; width: 44px; text-align: right; color: var(--tx); flex-shrink: 0; }
.results-actions { display: flex; gap: 10px; flex-wrap: wrap; }
/* --- REVIEW ALL SCREEN --- */
.all-history-screen { display: none; }
.ah-item {
  background: var(--card); border: 1px solid var(--bdr); border-radius: var(--radius);
  padding: 16px; margin-bottom: 10px;
}
.ah-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.ah-mode { font-weight: 700; font-size: 14px; color: var(--dk); }
.ah-score { font-weight: 800; font-size: 16px; color: var(--mg); }
.ah-meta { font-size: 12px; color: var(--tx2); }
.ah-actions { margin-top: 8px; display: flex; gap: 8px; }
/* --- SETTINGS OVERLAY --- */
.settings-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 200; justify-content: center; align-items: center;
}
.settings-overlay.show { display: flex; }
.settings-box {
  background: #fff; border-radius: var(--radius); padding: 28px 24px; width: 90%; max-width: 400px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.settings-title { font-size: 17px; font-weight: 700; color: var(--dk); margin-bottom: 16px; }
.settings-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid #eee;
}
.settings-label { font-size: 14px; color: var(--tx); }
.settings-val { font-size: 14px; color: var(--tx2); }
.s-btn {
  margin-top: 16px; width: 100%; padding: 12px; border-radius: var(--radius);
  font-size: 14px; font-weight: 600; cursor: pointer; border: none;
}
.s-btn-close { background: var(--mg); color: #fff; }
.s-btn-close:hover { background: var(--md); }
.s-btn-reset { background: #ffebee; color: #c62828; margin-top: 8px; }
.s-btn-reset:hover { background: #ffcdd2; }
/* Confirm dialog */
.confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; justify-content: center; align-items: center; }
.confirm-overlay.show { display: flex; }
.confirm-box { background: #fff; border-radius: var(--radius); padding: 24px; width: 85%; max-width: 360px; text-align: center; }
.confirm-msg { font-size: 15px; margin-bottom: 18px; line-height: 1.5; color: var(--tx); }
.confirm-actions { display: flex; gap: 10px; justify-content: center; }
/* --- RESPONSIVE --- */
@media (max-width: 540px) {
  .wrap { padding: 16px 12px 32px; }
  .modes { grid-template-columns: 1fr 1fr; gap: 10px; }
  .mode-card { padding: 16px 14px; }
  .stats-row { gap: 20px; }
  .stat-num { font-size: 22px; }
  .home-title { font-size: 20px; }
  .pill { width: 28px; height: 24px; font-size: 10px; }
  .quiz-stem { font-size: 14.5px; }
  .results-score-big { font-size: 44px; }
}
@media (max-width: 360px) {
  .modes { grid-template-columns: 1fr; }
}
/* Utility */
.hidden { display: none !important; }
/* Disable text selection on options during quiz */
.opt-btn { -webkit-user-select: none; user-select: none; }
/* Settings gear button */
.hdr-gear {
  background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer;
  font-size: 18px; padding: 4px; transition: color 0.2s;
}
.hdr-gear:hover { color: #fff; }
.hdr-right { display: flex; align-items: center; gap: 10px; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="hdr-title">CISA Try Out</div>
      <div class="hdr-sub">Cerita Mang Bedjo — Exam Preparation Platform</div>
    </div>
    <div class="hdr-right">
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="id" onclick="setLang('id')">ID</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
      <button class="hdr-gear" onclick="openSettings()" title="Settings">&#9881;</button>
    </div>
  </div>
</header>

<!-- HOME SCREEN -->
<div id="homeScreen" class="wrap">
  <h1 class="home-title" data-t="homeTitle"></h1>
  <p class="home-desc" data-t="homeDesc"></p>
  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="statQuestionCount">—</div><div class="stat-lbl" data-t="statQuestions"></div></div>
    <div class="stat"><div class="stat-num">5</div><div class="stat-lbl" data-t="statDomains"></div></div>
    <div class="stat"><div class="stat-num" id="statAttempts">0</div><div class="stat-lbl" data-t="statAttempts"></div></div>
  </div>
  <div class="modes">
    <div class="mode-card" onclick="startMode('exam')">
      <div class="mode-icon">&#128221;</div>
      <div class="mode-name" data-t="modeExam"></div>
      <div class="mode-desc" data-t="modeExamDesc"></div>
    </div>
    <div class="mode-card" onclick="startMode('quick')">
      <div class="mode-icon">&#9889;</div>
      <div class="mode-name" data-t="modeQuick"></div>
      <div class="mode-desc" data-t="modeQuickDesc"></div>
    </div>
    <div class="mode-card" onclick="startMode('drill')">
      <div class="mode-icon">&#127919;</div>
      <div class="mode-name" data-t="modeDrill"></div>
      <div class="mode-desc" data-t="modeDrillDesc"></div>
    </div>
    <div class="mode-card" onclick="startMode('review')">
      <div class="mode-icon">&#128218;</div>
      <div class="mode-name" data-t="modeReview"></div>
      <div class="mode-desc" data-t="modeReviewDesc"></div>
    </div>
  </div>
  <!-- Domain selector (shown for drill/review) -->
  <div class="domain-select-wrap" id="domainSelector">
    <div class="domain-select-title" data-t="selectDomain"></div>
    <div class="domain-options" id="domainOptions"></div>
  </div>
  <!-- History -->
  <div class="history-section" id="historySection">
    <div class="history-title" data-t="recentHistory"></div>
    <div id="historyContent"></div>
    <button class="history-more" id="historyMoreBtn" onclick="showAllHistory()" data-t="viewAllHistory"></button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quizScreen" class="wrap quiz-screen">
  <div class="quiz-topbar">
    <div class="quiz-progress" id="qProgress"></div>
    <div class="quiz-timer" id="qTimer"></div>
  </div>
  <div class="pill-nav" id="pillNav"></div>
  <div class="quiz-domain-tag" id="qDomainTag"></div>
  <div class="quiz-stem" id="qStem"></div>
  <div class="options-list" id="qOptions"></div>
  <div class="justification" id="qJust">
    <div class="just-title" data-t="justTitle"></div>
    <div id="qJustContent"></div>
  </div>
  <div class="quiz-nav" id="quizNav"></div>
</div>

<!-- RESULTS SCREEN -->
<div id="resultsScreen" class="wrap results-screen">
  <div class="results-header">
    <div class="results-score-big" id="rScoreBig"></div>
    <div class="results-score-label" id="rScoreLabel"></div>
    <div id="rPassFail"></div>
  </div>
  <div class="domain-breakdown">
    <div class="db-title" data-t="domainBreakdown"></div>
    <div id="rDomains"></div>
  </div>
  <div class="results-actions" id="rActions"></div>
</div>

<!-- ALL HISTORY SCREEN -->
<div id="allHistoryScreen" class="wrap all-history-screen"></div>

<!-- SETTINGS OVERLAY -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
  <div class="settings-box">
    <div class="settings-title" data-t="settingsTitle"></div>
    <div class="settings-row">
      <span class="settings-label" data-t="settingsLang"></span>
      <span class="settings-val" id="settingsLangVal"></span>
    </div>
    <div class="settings-row">
      <span class="settings-label" data-t="settingsAttempts"></span>
      <span class="settings-val" id="settingsAttemptVal"></span>
    </div>
    <div class="settings-row">
      <span class="settings-label" data-t="settingsVersion"></span>
      <span class="settings-val">v3.0 Bilingual</span>
    </div>
    <button class="s-btn s-btn-close" onclick="closeSettings()" data-t="settingsClose"></button>
    <button class="s-btn s-btn-reset" onclick="confirmReset()" data-t="settingsReset"></button>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="q-btn q-btn-secondary" onclick="closeConfirm()" data-t="confirmCancel"></button>
      <button class="q-btn q-btn-danger" id="confirmOkBtn"></button>
    </div>
  </div>
</div>

<script src="qbank.js"></script>
<script>
"use strict";

// ====== LOAD QUESTION BANK (from qbank.js) ======
let ALL_Q = [];
try {
  ALL_Q = _qb.getAll();
  var _keys = ['A','B','C','D'];
  ALL_Q.forEach(function(q) {
    // Ensure numeric domain exists
    if (typeof q.domain === 'undefined') {
      var m = q.id.match(/^D(\d)/);
      if (m) q.domain = parseInt(m[1], 10);
    }
    // Convert array options/justifications → object {A,B,C,D}
    function arrToObj(arr) {
      if (!Array.isArray(arr)) return arr;
      var obj = {};
      _keys.forEach(function(k, i) { obj[k] = arr[i] || ''; });
      return obj;
    }
    q.o = arrToObj(q.o);
    q.j = arrToObj(q.j);
    if (q.o_en) q.o_en = arrToObj(q.o_en);
    if (q.j_en) q.j_en = arrToObj(q.j_en);
  });
} catch(e) {
  console.error("Question bank load failed", e);
}


// ====== i18n ======
const T = {
  id: {
    homeTitle: 'Latihan Ujian CISA',
    homeDesc: 'Soal original berdasarkan CISA Review Manual 28th Edition\ndengan konteks regulasi Indonesia',
    statQuestions: 'SOAL', statDomains: 'DOMAIN', statAttempts: 'PERCOBAAN',
    modeExam: 'Exam Mode', modeExamDesc: '150 soal acak, 4 jam, simulasi ujian CISA',
    modeQuick: 'Quick Practice', modeQuickDesc: '30 soal acak, 1 jam, latihan cepat',
    modeDrill: 'Domain Drill', modeDrillDesc: 'Fokus satu domain, semua soal, tanpa timer',
    modeReview: 'Review', modeReviewDesc: 'Pelajari soal yang salah dari percobaan sebelumnya',
    selectDomain: 'Pilih Domain', recentHistory: 'Riwayat Terbaru',
    noHistory: 'Belum ada riwayat', viewAllHistory: 'Lihat Semua Riwayat',
    justTitle: 'Pembahasan',
    prev: 'Sebelumnya', next: 'Selanjutnya', submit: 'Selesai', checkAnswer: 'Cek Jawaban',
    of: 'dari', timeUp: 'Waktu Habis!',
    domainBreakdown: 'Skor per Domain',
    correct: 'Benar', wrong: 'Salah', unanswered: 'Belum Dijawab',
    backHome: 'Kembali', reviewWrong: 'Review Soal Salah', retryMode: 'Coba Lagi',
    settingsTitle: 'Pengaturan', settingsLang: 'Bahasa', settingsAttempts: 'Total Percobaan',
    settingsVersion: 'Versi', settingsClose: 'Tutup', settingsReset: 'Hapus Semua Riwayat',
    confirmCancel: 'Batal', confirmOk: 'Hapus',
    confirmResetMsg: 'Hapus semua riwayat percobaan? Tindakan ini tidak bisa dibatalkan.',
    confirmEndMsg: 'Selesaikan percobaan ini? Soal yang belum dijawab dihitung salah.',
    pass: 'LULUS', fail: 'BELUM LULUS', score: 'skor',

    prev: 'Previous', next: 'Next', submit: 'Finish', checkAnswer: 'Check Answer',

    correct: 'Correct', wrong: 'Wrong', unanswered: 'Unanswered',
    backHome: 'Back', reviewWrong: 'Review Wrong Answers', retryMode: 'Try Again',
    settingsTitle: 'Settings', settingsLang: 'Language', settingsAttempts: 'Total Attempts',
    settingsVersion: 'Version', settingsClose: 'Close', settingsReset: 'Clear All History',
    confirmCancel: 'Cancel', confirmOk: 'Delete',
    confirmResetMsg: 'Delete all attempt history? This action cannot be undone.',
    confirmEndMsg: 'Finish this attempt? Unanswered questions count as wrong.',

};

let lang = localStorage.getItem('cisa_lang') || 'id';

function t(key) { return (T[lang] && T[lang][key]) || (T.id[key]) || key; }

function setLang(l) {
  lang = l;
  localStorage.setItem('cisa_lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === l);
  });
  applyTranslations();
  // Re-render current view if quiz is active
  if (quiz.active && !document.getElementById('quizScreen').classList.contains('hidden')) {
    renderQuestion();
  }
}

function applyTranslations() {
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.dataset.t;
    const val = t(key);
    if (val) el.textContent = val;
  });
  // Update dynamic elements
  const sa = document.getElementById('settingsLangVal');
  if (sa) sa.textContent = lang === 'id' ? 'Bahasa Indonesia' : 'English';
  const sv = document.getElementById('settingsAttemptVal');
  if (sv) sv.textContent = getHistory().length;
  renderHistory();
}

// ====== DOMAIN CONFIG ======
const DOMAIN_WEIGHTS = {1: 0.18, 2: 0.18, 3: 0.12, 4: 0.26, 5: 0.26};
const DOMAIN_COUNTS = {};
ALL_Q.forEach(q => { DOMAIN_COUNTS[q.domain] = (DOMAIN_COUNTS[q.domain]||0)+1; });

// ====== QUESTION ACCESSORS (bilingual) ======
function qStem(q) { return lang === 'en' && q.s_en ? q.s_en : q.s; }
function qOpts(q) { return lang === 'en' && q.o_en ? q.o_en : q.o; }
function qJust(q) { return lang === 'en' && q.j_en ? q.j_en : q.j; }

// ====== HISTORY (localStorage) ======
function getHistory() {
  try { return JSON.parse(localStorage.getItem('cisa_history') || '[]'); }
  catch { return []; }
}
function saveHistory(h) { localStorage.setItem('cisa_history', JSON.stringify(h)); }

function addAttempt(attempt) {
  const h = getHistory();
  h.unshift(attempt);
  saveHistory(h);
}

function renderHistory() {
  const h = getHistory();
  document.getElementById('statAttempts').textContent = h.length;
  const container = document.getElementById('historyContent');
  const btn = document.getElementById('historyMoreBtn');

  if (h.length === 0) {
    container.innerHTML = '<div class="history-empty"><span class="history-empty-icon">&#128202;</span>' + t('noHistory') + '</div>';
    btn.classList.add('hidden');
    return;
  }

  const show = h.slice(0, 3);
  container.innerHTML = '';
  show.forEach((a, i) => {
    const pct = Math.round((a.correct / a.total) * 100);
    const d = new Date(a.date);
    const dateStr = d.toLocaleDateString(lang === 'id' ? 'id-ID' : 'en-US', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const modeLabel = a.mode === 'exam' ? 'Exam Mode' : a.mode === 'quick' ? 'Quick Practice' : 'Domain Drill' + (a.domain ? ' — D' + a.domain : '');
    const el = document.createElement('div');
    el.className = 'history-item';
    el.innerHTML = '<div class="hi-left"><div class="hi-mode">' + modeLabel + '</div><div class="hi-date">' + dateStr + ' · ' + a.correct + '/' + a.total + '</div></div><div class="hi-score">' + pct + '%</div>';
    el.onclick = () => reviewAttempt(i);
    container.appendChild(el);
  });
  btn.classList.toggle('hidden', h.length <= 3);
  btn.textContent = t('viewAllHistory');
}

// ====== QUIZ STATE ======
const quiz = {
  active: false,
  mode: null,       // exam | quick | drill | review
  questions: [],
  answers: {},      // idx -> 'A'|'B'|'C'|'D'
  revealed: {},     // idx -> true (for drill/review modes)
  currentIdx: 0,
  timerSec: 0,
  timerInterval: null,
  domain: null,
};

// ====== SCREEN NAVIGATION ======
function showScreen(id) {
  ['homeScreen','quizScreen','resultsScreen','allHistoryScreen'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
  window.scrollTo(0, 0);
}

// ====== START MODE ======
function startMode(mode) {
  quiz.mode = mode;
  const ds = document.getElementById('domainSelector');

  if (mode === 'drill') {
    ds.style.display = 'block';
    ds.querySelector('.domain-select-title').textContent = t('selectDomain');
    renderDomainOptions((d) => { beginDrill(d); });
    return;
  }
  if (mode === 'review') {
    startReviewMode();
    return;
  }
  ds.style.display = 'none';
  if (mode === 'exam') beginQuiz(150, 4*3600);
  else if (mode === 'quick') beginQuiz(30, 3600);
}

function renderDomainOptions(cb) {
  const container = document.getElementById('domainOptions');
  container.innerHTML = '';
  for (let d = 1; d <= 5; d++) {
    const el = document.createElement('div');
    el.className = 'domain-opt';
    el.innerHTML = '<span class="domain-opt-name">D' + d + ' — ' + t('domainNames')[d] + '</span><span class="domain-opt-count">' + (DOMAIN_COUNTS[d]||0) + ' ' + t('statQuestions').toLowerCase() + '</span>';
    el.onclick = () => cb(d);
    container.appendChild(el);
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function selectExamQuestions(total) {
  const selected = [];
  const byDomain = {};
  ALL_Q.forEach(q => {
    if (!byDomain[q.domain]) byDomain[q.domain] = [];
    byDomain[q.domain].push(q);
  });

  for (let d = 1; d <= 5; d++) {
    const pool = shuffle(byDomain[d] || []);
    const count = Math.round(total * DOMAIN_WEIGHTS[d]);
    selected.push(...pool.slice(0, count));
  }
  // Adjust to exact total
  while (selected.length < total) {
    const remaining = ALL_Q.filter(q => !selected.includes(q));
    if (remaining.length === 0) break;
    selected.push(remaining[Math.floor(Math.random() * remaining.length)]);
  }
  return shuffle(selected.slice(0, total));
}

function beginQuiz(numQ, timerSec) {
  quiz.questions = selectExamQuestions(numQ);
  quiz.answers = {};
  quiz.revealed = {};
  quiz.currentIdx = 0;
  quiz.timerSec = timerSec;
  quiz.active = true;
  quiz.domain = null;
  document.getElementById('domainSelector').style.display = 'none';
  showScreen('quizScreen');
  startTimer();
  renderPills();
  renderQuestion();
  renderNav();
}

function beginDrill(domain) {
  quiz.domain = domain;
  quiz.questions = shuffle(ALL_Q.filter(q => q.domain === domain));
  quiz.answers = {};
  quiz.revealed = {};
  quiz.currentIdx = 0;
  quiz.timerSec = 0;
  quiz.active = true;
  quiz.mode = 'drill';
  document.getElementById('domainSelector').style.display = 'none';
  showScreen('quizScreen');
  stopTimer();
  document.getElementById('qTimer').textContent = '';
  renderPills();
  renderQuestion();
  renderNav();
}

function startReviewMode() {
  const h = getHistory();
  // Collect all wrong question IDs
  const wrongIds = new Set();
  h.forEach(a => {
    if (a.wrongIds) a.wrongIds.forEach(id => wrongIds.add(id));
  });
  if (wrongIds.size === 0) {
    alert(t('noWrong'));
    return;
  }
  quiz.questions = shuffle(ALL_Q.filter(q => wrongIds.has(q.id)));
  quiz.answers = {};
  quiz.revealed = {};
  quiz.currentIdx = 0;
  quiz.timerSec = 0;
  quiz.active = true;
  quiz.mode = 'review';
  quiz.domain = null;
  document.getElementById('domainSelector').style.display = 'none';
  showScreen('quizScreen');
  stopTimer();
  document.getElementById('qTimer').textContent = '';
  renderPills();
  renderQuestion();
  renderNav();
}

// ====== TIMER ======
function startTimer() {
  stopTimer();
  updateTimerDisplay();
  quiz.timerInterval = setInterval(() => {
    if (quiz.timerSec <= 0) {
      stopTimer();
      finishQuiz(true);
      return;
    }
    quiz.timerSec--;
    updateTimerDisplay();
  }, 1000);
}

function stopTimer() {
  if (quiz.timerInterval) { clearInterval(quiz.timerInterval); quiz.timerInterval = null; }
}

function updateTimerDisplay() {
  const el = document.getElementById('qTimer');
  if (quiz.timerSec <= 0 && (quiz.mode === 'drill' || quiz.mode === 'review')) {
    el.textContent = '';
    return;
  }
  const h = Math.floor(quiz.timerSec / 3600);
  const m = Math.floor((quiz.timerSec % 3600) / 60);
  const s = quiz.timerSec % 60;
  el.textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// ====== RENDER QUESTION ======
function renderQuestion() {
  const q = quiz.questions[quiz.currentIdx];
  const total = quiz.questions.length;
  document.getElementById('qProgress').textContent = t('questionLabel') + ' ' + (quiz.currentIdx + 1) + ' ' + t('of') + ' ' + total;
  document.getElementById('qDomainTag').textContent = 'D' + q.domain + ' — ' + t('domainNames')[q.domain];
  document.getElementById('qStem').textContent = qStem(q);

  const optContainer = document.getElementById('qOptions');
  optContainer.innerHTML = '';
  const opts = qOpts(q);
  const userAns = quiz.answers[quiz.currentIdx];
  const revealed = quiz.revealed[quiz.currentIdx];

  ['A','B','C','D'].forEach(key => {
    const btn = document.createElement('div');
    btn.className = 'opt-btn';
    if (revealed) {
      btn.classList.add('opt-disabled');
      if (key === q.a) btn.classList.add('correct');
      else if (key === userAns) btn.classList.add('wrong');
      else btn.classList.add('neutral-revealed');
    } else if (userAns === key) {
      btn.classList.add('selected');
    }
    btn.innerHTML = '<div class="opt-key">' + key + '</div><div class="opt-text">' + escHtml(opts[key]) + '</div>';
    if (!revealed) {
      btn.onclick = () => selectOption(key);
    }
    optContainer.appendChild(btn);
  });

  // Justification
  const justEl = document.getElementById('qJust');
  const justContent = document.getElementById('qJustContent');
  if (revealed) {
    justEl.classList.add('show');
    const justs = qJust(q);
    justContent.innerHTML = '';
    ['A','B','C','D'].forEach(key => {
      const div = document.createElement('div');
      div.className = 'just-item';
      div.innerHTML = '<strong>' + key + '.</strong> ' + escHtml(justs[key]);
      justContent.appendChild(div);
    });
  } else {
    justEl.classList.remove('show');
  }

  renderPills();
  renderNav();
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function selectOption(key) {
  quiz.answers[quiz.currentIdx] = key;
  // In drill mode, auto-reveal
  if (quiz.mode === 'drill' || quiz.mode === 'review') {
    quiz.revealed[quiz.currentIdx] = true;
  }
  renderQuestion();
}

// ====== PILLS ======
function renderPills() {
  const container = document.getElementById('pillNav');
  const total = quiz.questions.length;
  // Hide pills if too many (exam mode 150)
  if (total > 60) { container.innerHTML = ''; return; }
  container.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const p = document.createElement('div');
    p.className = 'pill';
    if (i === quiz.currentIdx) p.classList.add('current');
    else if (quiz.revealed[i]) {
      p.classList.add(quiz.answers[i] === quiz.questions[i].a ? 'pill-correct' : 'pill-wrong');
    }
    else if (quiz.answers[i]) p.classList.add('answered');
    p.textContent = i + 1;
    p.onclick = () => { quiz.currentIdx = i; renderQuestion(); };
    container.appendChild(p);
  }
}

// ====== NAV BUTTONS ======
function renderNav() {
  const nav = document.getElementById('quizNav');
  nav.innerHTML = '';
  const idx = quiz.currentIdx;
  const total = quiz.questions.length;
  const isDrillLike = quiz.mode === 'drill' || quiz.mode === 'review';

  // Prev
  if (idx > 0) {
    const btn = document.createElement('button');
    btn.className = 'q-btn q-btn-secondary';
    btn.textContent = t('prev');
    btn.onclick = () => { quiz.currentIdx--; renderQuestion(); };
    nav.appendChild(btn);
  } else {
    const spacer = document.createElement('div');
    nav.appendChild(spacer);
  }

  // Right side: check answer / next / submit
  const rightDiv = document.createElement('div');
  rightDiv.style.display = 'flex';
  rightDiv.style.gap = '8px';

  if (isDrillLike) {
    // Show "Check Answer" if not revealed and has answer
    if (!quiz.revealed[idx] && quiz.answers[idx]) {
      const ck = document.createElement('button');
      ck.className = 'q-btn q-btn-primary';
      ck.textContent = t('checkAnswer');
      ck.onclick = () => { quiz.revealed[idx] = true; renderQuestion(); };
      rightDiv.appendChild(ck);
    }
    if (idx < total - 1) {
      const nx = document.createElement('button');
      nx.className = 'q-btn q-btn-primary';
      nx.textContent = t('next');
      nx.onclick = () => { quiz.currentIdx++; renderQuestion(); };
      rightDiv.appendChild(nx);
    } else {
      const fin = document.createElement('button');
      fin.className = 'q-btn q-btn-primary';
      fin.textContent = t('backHome');
      fin.onclick = () => endDrill();
      rightDiv.appendChild(fin);
    }
  } else {
    // Exam / Quick: next or submit
    if (idx < total - 1) {
      const nx = document.createElement('button');
      nx.className = 'q-btn q-btn-primary';
      nx.textContent = t('next');
      nx.onclick = () => { quiz.currentIdx++; renderQuestion(); };
      rightDiv.appendChild(nx);
    }
    const sub = document.createElement('button');
    sub.className = 'q-btn ' + (idx === total - 1 ? 'q-btn-primary' : 'q-btn-secondary');
    sub.textContent = t('submit');
    sub.onclick = () => confirmFinish();
    rightDiv.appendChild(sub);
  }

  nav.appendChild(rightDiv);
}

function confirmFinish() {
  showConfirm(t('confirmEndMsg'), t('submit'), () => finishQuiz(false));
}

function endDrill() {
  // Save drill/review as attempt
  let correct = 0;
  const wrongIds = [];
  quiz.questions.forEach((q, i) => {
    if (quiz.answers[i] === q.a) correct++;
    else wrongIds.push(q.id);
  });
  const total = quiz.questions.length;
  if (total > 0) {
    addAttempt({
      mode: quiz.mode, domain: quiz.domain, date: new Date().toISOString(),
      correct, total, wrongIds,
      domainScores: calcDomainScores()
    });
  }
  cleanup();
  showScreen('homeScreen');
  applyTranslations();
}

function finishQuiz(timeUp) {
  stopTimer();
  closeConfirm();
  let correct = 0;
  const wrongIds = [];
  quiz.questions.forEach((q, i) => {
    if (quiz.answers[i] === q.a) correct++;
    else wrongIds.push(q.id);
  });
  const total = quiz.questions.length;
  const domainScores = calcDomainScores();

  addAttempt({
    mode: quiz.mode, domain: quiz.domain, date: new Date().toISOString(),
    correct, total, wrongIds, domainScores
  });

  renderResults(correct, total, domainScores, timeUp);
  cleanup();
  showScreen('resultsScreen');
}

function calcDomainScores() {
  const ds = {};
  quiz.questions.forEach((q, i) => {
    if (!ds[q.domain]) ds[q.domain] = {correct: 0, total: 0};
    ds[q.domain].total++;
    if (quiz.answers[i] === q.a) ds[q.domain].correct++;
  });
  return ds;
}

function cleanup() {
  quiz.active = false;
  quiz.questions = [];
  quiz.answers = {};
  quiz.revealed = {};
  quiz.currentIdx = 0;
  stopTimer();
}

// ====== RESULTS ======
function renderResults(correct, total, domainScores, timeUp) {
  const pct = Math.round((correct / total) * 100);
  document.getElementById('rScoreBig').textContent = pct + '%';
  document.getElementById('rScoreLabel').textContent = correct + ' / ' + total + ' ' + t('correct').toLowerCase();

  const pfEl = document.getElementById('rPassFail');
  if (quiz.mode === 'exam' || quiz.mode === 'quick') {
    const pass = pct >= 60;
    pfEl.innerHTML = '<span class="results-passfail ' + (pass ? 'results-pass' : 'results-fail') + '">' + (pass ? t('pass') : t('fail')) + '</span>';
    if (timeUp) pfEl.innerHTML += '<div style="margin-top:8px;font-size:13px;color:var(--ao)">' + t('timeUp') + '</div>';
  } else {
    pfEl.innerHTML = '';
  }

  // Domain breakdown
  const domEl = document.getElementById('rDomains');
  domEl.innerHTML = '';
  for (let d = 1; d <= 5; d++) {
    const s = domainScores[d];
    if (!s) continue;
    const dp = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
    const barClass = dp < 40 ? 'low' : dp < 60 ? 'mid' : '';
    const row = document.createElement('div');
    row.className = 'db-item';
    row.innerHTML = '<div class="db-label">D' + d + '</div><div class="db-bar-wrap"><div class="db-bar ' + barClass + '" style="width:' + dp + '%"></div></div><div class="db-pct">' + dp + '%</div>';
    domEl.appendChild(row);
  }

  // Actions
  const actEl = document.getElementById('rActions');
  actEl.innerHTML = '';
  const btnHome = document.createElement('button');
  btnHome.className = 'q-btn q-btn-secondary';
  btnHome.textContent = t('backHome');
  btnHome.onclick = () => { showScreen('homeScreen'); applyTranslations(); };
  actEl.appendChild(btnHome);

  const btnReview = document.createElement('button');
  btnReview.className = 'q-btn q-btn-primary';
  btnReview.textContent = t('reviewWrong');
  btnReview.onclick = () => startReviewMode();
  actEl.appendChild(btnReview);
}

// ====== REVIEW ATTEMPT (from history click) ======
function reviewAttempt(histIdx) {
  const h = getHistory();
  const a = h[histIdx];
  if (!a) return;
  renderResults(a.correct, a.total, a.domainScores || {}, false);
  showScreen('resultsScreen');
}

// ====== ALL HISTORY ======
function showAllHistory() {
  const h = getHistory();
  const screen = document.getElementById('allHistoryScreen');
  screen.style.display = '';
  showScreen('allHistoryScreen');
  screen.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px"><h2 style="font-size:18px;font-weight:700;color:var(--dk)">' + t('allHistory') + '</h2><button class="q-btn q-btn-secondary" onclick="showScreen(\'homeScreen\');applyTranslations()" style="padding:8px 16px;font-size:13px">' + t('backHome') + '</button></div>';

  if (h.length === 0) {
    screen.innerHTML += '<div class="history-empty">' + t('noHistory') + '</div>';
    return;
  }

  h.forEach((a, i) => {
    const pct = Math.round((a.correct / a.total) * 100);
    const d = new Date(a.date);
    const dateStr = d.toLocaleDateString(lang === 'id' ? 'id-ID' : 'en-US', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const modeLabel = a.mode === 'exam' ? 'Exam Mode' : a.mode === 'quick' ? 'Quick Practice' : a.mode === 'review' ? 'Review' : 'Domain Drill' + (a.domain ? ' — D' + a.domain : '');
    const el = document.createElement('div');
    el.className = 'ah-item';
    el.innerHTML = '<div class="ah-top"><div class="ah-mode">' + modeLabel + '</div><div class="ah-score">' + pct + '%</div></div><div class="ah-meta">' + dateStr + ' · ' + a.correct + '/' + a.total + ' ' + t('correct').toLowerCase() + '</div>';
    el.style.cursor = 'pointer';
    el.onclick = () => reviewAttempt(i);
    screen.appendChild(el);
  });
}

// ====== SETTINGS ======
function openSettings() {
  document.getElementById('settingsOverlay').classList.add('show');
  applyTranslations();
}
function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('show');
}
function closeSettingsOutside(e) {
  if (e.target === document.getElementById('settingsOverlay')) closeSettings();
}

function confirmReset() {
  closeSettings();
  showConfirm(t('confirmResetMsg'), t('confirmOk'), () => {
    localStorage.removeItem('cisa_history');
    closeConfirm();
    applyTranslations();
  });
}

// ====== CONFIRM DIALOG ======
function showConfirm(msg, okText, okFn) {
  document.getElementById('confirmMsg').textContent = msg;
  const okBtn = document.getElementById('confirmOkBtn');
  okBtn.textContent = okText;
  okBtn.onclick = okFn;
  document.getElementById('confirmOverlay').classList.add('show');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('show');
}

// ====== INIT ======
(function init() {
  setLang(lang);
  document.getElementById('statQuestionCount').textContent = ALL_Q.length;
  showScreen('homeScreen');
  applyTranslations();
})();
</script>
